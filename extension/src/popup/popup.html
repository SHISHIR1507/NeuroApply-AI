<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroApply AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Animated aurora backdrop -->
  <div class="aurora" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-logo">
        <img class="logo-img" src="../../icons/icon48.png" alt="">
        <h1>NeuroApply AI</h1>
      </div>
      <div class="header-right">
        <label class="toggle-switch" title="Enable/disable autofill">
          <input type="checkbox" id="enableToggle">
          <span class="toggle-slider"></span>
        </label>
        <div id="statusIndicator" class="status-indicator status-disconnected">
          <span class="status-dot"></span>
          <span class="status-text">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- Auth Section (shown when not logged in) -->
    <section id="authSection" class="section hidden">
      <h2>Sign In</h2>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" minlength="8">
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary">Sign In</button>
        <p class="auth-toggle">
          No account? <a href="#" id="showRegister">Sign Up</a>
        </p>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input type="text" id="registerName" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" required placeholder="••••••••" minlength="8">
        </div>
        <button type="submit" id="registerBtn" class="btn btn-primary">Create Account</button>
        <p class="auth-toggle">
          Have an account? <a href="#" id="showLogin">Sign In</a>
        </p>
      </form>
      <p id="authError" class="error-text hidden"></p>
    </section>

    <!-- Main Section (shown when logged in) -->
    <section id="mainSection" class="section hidden">

      <!-- Signed-in account -->
      <div class="account-chip">
        <div class="account-avatar" id="accountAvatar">·</div>
        <div class="account-info">
          <span class="account-label">Signed in as</span>
          <span class="account-email" id="accountEmail">…</span>
        </div>
      </div>

      <!-- Fill current page — the one primary action -->
      <button id="fillNowBtn" class="btn btn-primary fill-now-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:7px">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Fill this page
      </button>

      <!-- Quick actions — one compact row instead of 3 stacked boxes -->
      <div class="quick-actions">
        <button id="atsBtn" class="qa-btn">
          <span class="qa-icon qa-icon-cyan">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </span>
          <span class="qa-label">ATS Score</span>
        </button>
        <button id="dashboardBtn" class="qa-btn">
          <span class="qa-icon qa-icon-amber">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </span>
          <span class="qa-label">Dashboard</span>
        </button>
        <button id="openProfileBtn" class="qa-btn">
          <span class="qa-icon qa-icon-amber">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8L20 11l-6.1 2.2L12 19l-1.9-5.8L4 11l6.1-2.2L12 3z"/></svg>
          </span>
          <span class="qa-label">AI Profile</span>
        </button>
      </div>

      <!-- Resume Card -->
      <div class="card resume-card">
        <div class="resume-card-row">
          <div class="resume-card-info">
            <h3>Resume</h3>
            <div id="resumeStatus" class="resume-status">
              <p class="muted">No resume uploaded</p>
            </div>
          </div>
          <label for="resumeUpload" class="btn btn-secondary upload-btn-sm">Upload</label>
          <input type="file" id="resumeUpload" accept=".pdf,.docx,.doc,.txt" class="hidden">
        </div>
      </div>

      <!-- Auto-advance toggle -->
      <div class="autoadvance-row">
        <div>
          <p class="aa-title">Auto-advance steps</p>
          <p class="aa-sub">Clicks “Next” for you · never submits</p>
        </div>
        <label class="toggle-switch" title="Auto-click Next between steps">
          <input type="checkbox" id="autoAdvanceToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <button id="logoutBtn" class="btn btn-ghost">Sign Out</button>
    </section>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
