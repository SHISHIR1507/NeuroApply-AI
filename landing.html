<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroApply AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #04060f;
      --win:      rgba(7,11,26,0.82);
      --surface:  rgba(255,255,255,0.035);
      --surf2:    rgba(255,255,255,0.06);
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.11);
      --accent:   #6366f1;
      --accent2:  #8b5cf6;
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --text3:    #3f4d62;
      --green:    #34d399;
      --font:     'Inter', -apple-system, sans-serif;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background gradient ─────────────────────────────────────── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(99,102,241,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 20% 100%, rgba(59,130,246,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 90%,  rgba(139,92,246,0.06) 0%, transparent 55%);
    }

    /* ── Light rays ──────────────────────────────────────────────── */
    .rays {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .ray {
      position: absolute;
      top: -5%;
      transform-origin: top center;
      opacity: 0;
      animation: rayPulse 7s ease-in-out infinite;
    }
    .ray-1 {
      left: calc(50% - 220px); width: 200px; height: 90vh;
      background: linear-gradient(180deg, rgba(99,102,241,0.13) 0%, transparent 100%);
      transform: rotate(-10deg) skewX(-2deg);
      animation-delay: 0s;
    }
    .ray-2 {
      left: calc(50% - 80px); width: 260px; height: 90vh;
      background: linear-gradient(180deg, rgba(139,92,246,0.16) 0%, transparent 100%);
      transform: rotate(0deg);
      animation-delay: 0.6s;
    }
    .ray-3 {
      left: calc(50% + 80px); width: 180px; height: 90vh;
      background: linear-gradient(180deg, rgba(99,102,241,0.1) 0%, transparent 100%);
      transform: rotate(10deg) skewX(2deg);
      animation-delay: 1.2s;
    }
    @keyframes rayPulse {
      0%,100% { opacity: 0; }
      25%, 75% { opacity: 1; }
    }

    /* ── Particle canvas ─────────────────────────────────────────── */
    #ptx {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #ptx.on { opacity: 1; }

    /* ── Main window ─────────────────────────────────────────────── */
    .win {
      position: relative; z-index: 1;
      width:  min(960px, calc(100vw - 60px));
      height: min(640px, calc(100vh - 60px));
      margin: auto;
      top: 50%; transform: translateY(-50%);

      display: flex; flex-direction: column;
      border-radius: 24px;
      background: var(--win);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid var(--border);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 80px rgba(0,0,0,0.8),
        0 0 120px rgba(0,0,0,0.6),
        0 0 40px rgba(99,102,241,0.06);
      overflow: hidden;

      opacity: 0;
      animation: winIn 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }
    @keyframes winIn {
      from { opacity: 0; transform: translateY(calc(-50% + 24px)) scale(0.975); }
      to   { opacity: 1; transform: translateY(-50%) scale(1); }
    }

    /* ── Window chrome ───────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-orb {
      width: 26px; height: 26px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px rgba(99,102,241,0.35);
    }
    .brand-name {
      font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em;
    }

    .nav { display: flex; gap: 2px; }
    .nav a {
      font-size: 12.5px; color: var(--text3); padding: 5px 12px;
      border-radius: 8px; cursor: pointer; text-decoration: none;
      transition: color 0.15s, background 0.15s;
    }
    .nav a:hover  { color: var(--text2); background: var(--surface); }
    .nav a.active { color: var(--text);  background: var(--surface); }

    .upgrade-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--text2); font-family: var(--font);
      font-size: 12px; font-weight: 500;
      padding: 5px 13px; border-radius: 20px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .upgrade-pill:hover {
      background: var(--surf2);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .upgrade-pill svg { color: #fbbf24; }

    /* ── Content ─────────────────────────────────────────────────── */
    .content { flex: 1; position: relative; overflow: hidden; }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 0 60px; text-align: center;
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .hero.out { opacity: 0; transform: translateY(-28px) scale(0.97); pointer-events: none; }

    .hero-icon {
      position: relative;
      width: 64px; height: 64px; border-radius: 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 40px rgba(99,102,241,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
      margin-bottom: 6px;

      opacity: 0; transform: scale(0.75) translateY(10px);
      animation: iconIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.7s forwards;
    }
    @keyframes iconIn { to { opacity:1; transform:scale(1) translateY(0); } }

    .hero-icon::before {
      content: '';
      position: absolute; inset: -10px; border-radius: 28px;
      border: 1px solid rgba(99,102,241,0.18);
      animation: iconRing 3.5s ease-in-out infinite 2s;
    }
    @keyframes iconRing {
      0%,100% { opacity: 0; transform: scale(0.94); }
      50%      { opacity: 1; transform: scale(1.04); }
    }

    /* Floating bob */
    .hero-icon-inner {
      animation: bob 4s ease-in-out infinite 1.5s;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    .hero-h1 {
      font-size: 34px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.18;
      color: rgba(255,255,255,0.92);
      opacity: 0; transform: translateY(16px); filter: blur(6px);
      animation: headIn 0.9s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
    }
    .hero-h1 span {
      background: linear-gradient(130deg, #c7d2fe 10%, #a5b4fc 50%, #818cf8 90%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    @keyframes headIn { to { opacity:1; transform:translateY(0); filter:blur(0); } }

    .hero-sub {
      font-size: 13.5px; color: var(--text3); line-height: 1.65; max-width: 310px;
      opacity: 0; transform: translateY(8px);
      animation: subIn 0.7s ease 1.6s forwards;
    }
    @keyframes subIn { to { opacity:1; transform:translateY(0); } }

    /* ── Messages ────────────────────────────────────────────────── */
    .msgs {
      position: absolute; inset: 0;
      overflow-y: auto; overflow-x: hidden;
      padding: 22px 28px 8px;
      display: flex; flex-direction: column; gap: 14px;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .msgs.on { opacity: 1; }
    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 2px; }

    /* user */
    .msg-u {
      align-self: flex-end; max-width: 58%;
      background: rgba(99,102,241,0.16);
      border: 1px solid rgba(99,102,241,0.28);
      backdrop-filter: blur(20px);
      border-radius: 18px 18px 4px 18px;
      padding: 11px 16px;
      font-size: 13.5px; line-height: 1.55; color: var(--text);
      opacity: 0; transform: scale(0.94) translateY(10px);
      transition: opacity 0.45s cubic-bezier(0.34,1.56,0.64,1),
                  transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    .msg-u.on { opacity:1; transform:scale(1) translateY(0); }

    /* bot row */
    .bot-row {
      display: flex; gap: 10px; align-items: flex-start;
      opacity: 0; transform: translateX(-18px);
      transition: opacity 0.45s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bot-row.on { opacity:1; transform:translateX(0); }

    .bot-av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }

    .msg-b {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      backdrop-filter: blur(20px);
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      font-size: 13.5px; line-height: 1.6; color: var(--text2);
    }

    /* typing cursor */
    .tc {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom; border-radius: 1px;
      animation: tcBlink 0.8s step-end infinite;
    }
    @keyframes tcBlink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* code block */
    .code-card {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; overflow: hidden; margin-top: 12px;
      max-height: 0; opacity: 0;
      transition: max-height 0.7s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    }
    .code-card.on { max-height: 280px; opacity: 1; }

    .code-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.025);
    }
    .code-lang {
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text3);
    }
    .copy-btn {
      font-size: 11px; color: var(--text3);
      background: none; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 5px; padding: 2px 9px; cursor: pointer;
      font-family: var(--font);
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: var(--text2); border-color: rgba(255,255,255,0.15); }

    .code-pre {
      padding: 14px 16px;
      font-family: 'SF Mono','Fira Code','Cascadia Code',monospace;
      font-size: 11.5px; line-height: 1.75;
      overflow-x: auto;
    }
    .code-pre::-webkit-scrollbar { height: 3px; }
    .code-pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .cl {
      display: block; white-space: pre;
      opacity: 0; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.35s ease;
    }
    .cl.on { opacity:1; transform:translateY(0); }

    /* syntax */
    .kw  { color: #818cf8; }
    .tg  { color: #f97316; }
    .at  { color: #fbbf24; }
    .sv  { color: #34d399; }
    .pn  { color: #475569; }
    .vl  { color: #fb923c; }
    .pr  { color: #c084fc; }

    /* explain card */
    .xcard {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 11px 14px; margin-top: 10px;
      font-size: 12.5px; color: var(--text3); line-height: 1.65;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }
    .xcard.on { opacity:1; transform:translateY(0); }
    .xcard strong { color: var(--text2); font-weight: 500; }

    /* ── Input area ──────────────────────────────────────────────── */
    .input-area {
      flex-shrink: 0; padding: 12px 20px 18px;
      opacity: 0; transform: translateY(22px);
      animation: inputIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 2.1s forwards;
    }
    @keyframes inputIn { to { opacity:1; transform:translateY(0); } }

    .pro-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 11.5px; color: var(--text3);
      margin-bottom: 10px; padding: 0 2px;
    }
    .pro-row .lt { color: #fbbf24; }
    .pro-row .sep { flex: 1; }
    .pro-row .ext { display: flex; align-items: center; gap: 6px; }
    .sdot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 7px var(--green);
      opacity: 0; animation: dotOn 0.6s ease 2.9s forwards;
    }
    @keyframes dotOn { to { opacity:1; } }

    .ishell {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.038);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 10px 12px;
      position: relative; overflow: hidden;
      transition: border-color 0.2s;
    }
    .ishell:hover { border-color: rgba(255,255,255,0.14); }

    /* reflection sweep */
    .ishell::after {
      content: '';
      position: absolute; top: 0; left: -120%; width: 55%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.045),transparent);
      animation: sweep 5s ease-in-out 2.8s infinite;
      pointer-events: none;
    }
    @keyframes sweep {
      0%   { left: -120%; opacity: 0; }
      8%   { opacity: 1; }
      65%  { left: 160%; opacity: 1; }
      72%  { opacity: 0; }
      100% { left: 160%; opacity: 0; }
    }

    .plus-btn {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      color: var(--text3); font-size: 19px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .plus-btn:hover { background: rgba(255,255,255,0.09); color: var(--text2); }

    .ifield {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: var(--font); font-size: 13.5px; color: var(--text);
      caret-color: var(--accent);
    }
    .ifield::placeholder { color: var(--text3); }

    .ibtns { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

    .ibtn {
      width: 28px; height: 28px; border-radius: 7px;
      background: none; border: none; color: var(--text3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .ibtn:hover { color: var(--text2); background: rgba(255,255,255,0.05); }

    .sbtn {
      width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(99,102,241,0.4);
      transition: opacity 0.15s, transform 0.1s;
    }
    .sbtn:hover { opacity: 0.85; transform: scale(1.06); }

    /* chips */
    .chips {
      display: flex; gap: 7px; margin-top: 11px; flex-wrap: wrap;
    }
    .chip {
      font-size: 11.5px; color: var(--text3);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 5px 13px;
      cursor: pointer; user-select: none;
      transition: color 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .chip:hover {
      color: var(--text2);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.13);
      box-shadow: 0 0 16px rgba(99,102,241,0.12);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="rays">
    <div class="ray ray-1"></div>
    <div class="ray ray-2"></div>
    <div class="ray ray-3"></div>
  </div>
  <canvas id="ptx"></canvas>

  <div class="win">

    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-orb">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
          </svg>
        </div>
        <span class="brand-name">NeuroApply AI</span>
      </div>

      <nav class="nav">
        <a class="active" href="#">Chat</a>
        <a href="#">History</a>
        <a href="#">Settings</a>
      </nav>

      <button class="upgrade-pill">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 2L4.5 13.5H11L10 22L20.5 10H14L13 2Z"/>
        </svg>
        Upgrade
      </button>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Hero -->
      <div class="hero" id="hero">
        <div class="hero-icon">
          <div class="hero-icon-inner">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
              <defs>
                <linearGradient id="ig" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#a5b4fc"/>
                  <stop offset="1" stop-color="#c084fc"/>
                </linearGradient>
              </defs>
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill="url(#ig)"/>
            </svg>
          </div>
        </div>
        <h1 class="hero-h1">Good to See You!<br><span>How Can I be an Assistance?</span></h1>
        <p class="hero-sub">I'm available 24/7 for you, ask me anything.</p>
      </div>

      <!-- Messages -->
      <div class="msgs" id="msgs"></div>

    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="pro-row">
        <span class="lt">⚡</span>
        <span>Unlock more features with the Pro plan.</span>
        <span class="sep"></span>
        <div class="ext">
          <span>Active extensions</span>
          <span class="sdot"></span>
        </div>
      </div>

      <div class="ishell">
        <button class="plus-btn">+</button>
        <input class="ifield" placeholder="Ask anything…" readonly>
        <div class="ibtns">
          <button class="ibtn" title="Voice">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
            </svg>
          </button>
          <button class="sbtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="chips">
        <span class="chip">Any advice for me?</span>
        <span class="chip">Some youtube video idea</span>
        <span class="chip">Life lessons from kratos</span>
      </div>
    </div>

  </div>

  <script>
  /* ── Particles ───────────────────────────────────────────────────── */
  const ptx = document.getElementById('ptx');
  const pctx = ptx.getContext('2d');
  let pts = [];

  function resizePtx() {
    ptx.width  = window.innerWidth;
    ptx.height = window.innerHeight;
  }
  resizePtx();
  window.addEventListener('resize', () => { resizePtx(); initPts(); });

  function initPts() {
    pts = Array.from({ length: 70 }, () => ({
      x:  Math.random() * ptx.width,
      y:  Math.random() * ptx.height,
      r:  Math.random() * 1.1 + 0.25,
      dx: (Math.random() - 0.5) * 0.15,
      dy: (Math.random() - 0.5) * 0.15,
      a:  Math.random() * 0.28 + 0.04,
    }));
  }
  initPts();

  function drawPts() {
    pctx.clearRect(0, 0, ptx.width, ptx.height);
    for (const p of pts) {
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      pctx.fillStyle = `rgba(148,163,184,${p.a})`;
      pctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < -4) p.x = ptx.width + 4;
      if (p.x > ptx.width + 4)  p.x = -4;
      if (p.y < -4) p.y = ptx.height + 4;
      if (p.y > ptx.height + 4) p.y = -4;
    }
    requestAnimationFrame(drawPts);
  }
  drawPts();

  /* ── Helpers ─────────────────────────────────────────────────────── */
  const wait = ms => new Promise(r => setTimeout(r, ms));

  const BOT_AV = `<div class="bot-av">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="white">
      <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
    </svg>
  </div>`;

  const CODE = [
    `<span class="pn">&lt;</span><span class="tg">button</span> <span class="at">class</span><span class="pn">="</span><span class="sv">btn</span><span class="pn">"&gt;</span>`,
    `  <span class="pn">&lt;</span><span class="tg">span</span> <span class="at">class</span><span class="pn">="</span><span class="sv">btn-label</span><span class="pn">"&gt;</span><span style="color:#e2e8f0">Click Me</span><span class="pn">&lt;/</span><span class="tg">span</span><span class="pn">&gt;</span>`,
    `  <span class="pn">&lt;</span><span class="tg">span</span> <span class="at">class</span><span class="pn">="</span><span class="sv">btn-glow</span><span class="pn">"&gt;&lt;/</span><span class="tg">span</span><span class="pn">&gt;</span>`,
    `<span class="pn">&lt;/</span><span class="tg">button</span><span class="pn">&gt;</span>`,
    ``,
    `<span class="pn">&lt;</span><span class="tg">style</span><span class="pn">&gt;</span>`,
    `<span class="kw">.btn</span> <span class="pn">{</span>`,
    `  <span class="pr">padding</span><span class="pn">:</span> <span class="vl">12px 28px</span><span class="pn">;</span>`,
    `  <span class="pr">background</span><span class="pn">:</span> <span class="kw">linear-gradient</span><span class="pn">(</span><span class="vl">135deg</span><span class="pn">,</span> <span class="sv">#6366f1</span><span class="pn">,</span> <span class="sv">#8b5cf6</span><span class="pn">);</span>`,
    `  <span class="pr">border-radius</span><span class="pn">:</span> <span class="vl">10px</span><span class="pn">;</span>`,
    `  <span class="pr">color</span><span class="pn">:</span> <span class="sv">white</span><span class="pn">;</span>`,
    `  <span class="pr">font-weight</span><span class="pn">:</span> <span class="vl">600</span><span class="pn">;</span>`,
    `  <span class="pr">cursor</span><span class="pn">:</span> <span class="vl">pointer</span><span class="pn">;</span>`,
    `<span class="pn">}</span>`,
    `<span class="pn">&lt;/</span><span class="tg">style</span><span class="pn">&gt;</span>`,
  ];

  async function typeIn(el, text, speed = 26) {
    let i = 0;
    return new Promise(res => {
      const id = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) { clearInterval(id); res(); }
      }, speed);
    });
  }

  /* ── Animation Sequence ─────────────────────────────────────────── */
  const hero = document.getElementById('hero');
  const msgs = document.getElementById('msgs');

  async function scene3() {
    ptx.classList.add('on');
  }

  async function scene4() {
    hero.classList.add('out');
    msgs.classList.add('on');

    const u = document.createElement('div');
    u.className = 'msg-u';
    u.textContent = 'Generate HTML markup for a simple button';
    msgs.appendChild(u);
    msgs.scrollTop = msgs.scrollHeight;
    await wait(40);
    u.classList.add('on');
  }

  async function scene5() {
    const row = document.createElement('div');
    row.className = 'bot-row';
    row.innerHTML = BOT_AV + '<div class="msg-b"></div>';
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    await wait(40);
    row.classList.add('on');

    const mb = row.querySelector('.msg-b');
    const cur = document.createElement('span');
    cur.className = 'tc';
    mb.appendChild(cur);

    const phrase = "Here's a simple yet visually appealing button markup using HTML";
    let i = 0;
    await new Promise(res => {
      const id = setInterval(() => {
        mb.insertBefore(document.createTextNode(phrase[i++]), cur);
        msgs.scrollTop = msgs.scrollHeight;
        if (i >= phrase.length) { clearInterval(id); res(); }
      }, 28);
    });
    cur.remove();

    return mb;
  }

  async function scene6(mb) {
    const cc = document.createElement('div');
    cc.className = 'code-card';
    cc.innerHTML = `
      <div class="code-top">
        <span class="code-lang">HTML</span>
        <button class="copy-btn">Copy Code</button>
      </div>
      <div class="code-pre" id="cpre"></div>`;
    mb.appendChild(cc);
    msgs.scrollTop = msgs.scrollHeight;
    await wait(40);
    cc.classList.add('on');
    await wait(200);

    const pre = cc.querySelector('#cpre');
    for (let i = 0; i < CODE.length; i++) {
      const ln = document.createElement('span');
      ln.className = 'cl';
      ln.innerHTML = CODE[i] || '&nbsp;';
      pre.appendChild(ln);
      await wait(28);
      ln.classList.add('on');
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  async function scene7(mb) {
    const xc = document.createElement('div');
    xc.className = 'xcard';
    xc.innerHTML = `<strong>The button</strong> uses a <strong>gradient background</strong> with a layered glow element — easily extended with hover animations, ripple effects, or icon slots.`;
    mb.appendChild(xc);
    msgs.scrollTop = msgs.scrollHeight;
    await wait(40);
    xc.classList.add('on');
  }

  async function run() {
    await wait(3200);
    await scene3();

    await wait(1400);
    await scene4();

    await wait(800);
    const mb = await scene5();

    await wait(500);
    await scene6(mb);

    await wait(600);
    await scene7(mb);
  }

  run();

  /* copy button */
  document.addEventListener('click', e => {
    if (e.target.classList.contains('copy-btn')) {
      e.target.textContent = '✓ Copied!';
      e.target.style.color = '#34d399';
      setTimeout(() => {
        e.target.textContent = 'Copy Code';
        e.target.style.color = '';
      }, 1800);
    }
  });
  </script>
</body>
</html>
